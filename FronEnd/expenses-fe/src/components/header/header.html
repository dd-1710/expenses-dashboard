<div>
    <header class="relative bg-slate-900 dark:bg-neutral-900 text-white px-4 sm:px-6 py-3.5 shadow-lg dark:shadow-none dark:border-b dark:border-neutral-800 transition-colors duration-300">
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-emerald-500/15 flex items-center justify-center">
            <fa-icon [icon]="['fas','indian-rupee-sign']" class="text-emerald-400 text-sm"></fa-icon>
          </div>
          <span class="text-base font-semibold tracking-tight">Expenses Tracker</span>
        </div>

        <div class="ml-auto hidden sm:flex items-center gap-2">
          <button (click)="toggleDarkMode()" class="w-9 h-9 rounded-lg flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10 transition-colors cursor-pointer">
            <fa-icon [icon]="isDarkMode ? ['fas','circle-half-stroke'] : ['fas','moon']" class="text-sm"></fa-icon>
          </button>
          <button
              class="inline-flex items-center gap-1.5 bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-semibold px-3.5 py-2 rounded-lg transition-colors duration-200 cursor-pointer"
              (click)="showExpense.set(true)">
              <fa-icon [icon]="['fas','plus']" class="text-[10px]"></fa-icon>
              Add Expense
          </button>
          <button (click)="signOut()" class="inline-flex items-center gap-1.5 text-slate-400 hover:text-white text-xs font-medium px-2.5 py-2 cursor-pointer transition-colors duration-200 bg-transparent border-none outline-none rounded-lg hover:bg-white/5">
             <fa-icon [icon]="['fas','sign-out']"></fa-icon> SignOut
          </button>
        </div>

        <div class="ml-auto flex sm:hidden items-center gap-1.5">
          <button
            class="w-9 h-9 rounded-lg bg-emerald-500/15 flex items-center justify-center text-emerald-400 hover:bg-emerald-500/25 transition-colors cursor-pointer"
            (click)="showExpense.set(true)">
            <fa-icon [icon]="['fas','plus']" class="text-sm"></fa-icon>
          </button>
          <button (click)="isMenuOpen = !isMenuOpen" class="w-9 h-9 rounded-lg flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10 transition-colors cursor-pointer">
            <fa-icon [icon]="isMenuOpen ? ['fas','xmark'] : ['fas','bars']" class="text-base"></fa-icon>
          </button>
        </div>
      </div>

      @if (isMenuOpen) {
        <div class="sm:hidden absolute right-1 top-full mt-1 w-44 bg-slate-800 dark:bg-neutral-800 rounded-xl shadow-xl border border-slate-700/50 dark:border-neutral-700 z-50 menu-slide-down overflow-hidden">
          <button (click)="toggleDarkMode()" class="w-full flex items-center gap-3 px-3.5 py-3 hover:bg-white/5 transition-colors cursor-pointer text-left">
            <fa-icon [icon]="isDarkMode ? ['fas','circle-half-stroke'] : ['fas','moon']" class="text-sm text-slate-400"></fa-icon>
            <span class="text-sm text-slate-200">{{isDarkMode ? 'Light Mode' : 'Dark Mode'}}</span>
          </button>
          <div class="h-px bg-white/5"></div>
          <button (click)="signOut()" class="w-full flex items-center gap-3 px-3.5 py-3 hover:bg-white/5 transition-colors cursor-pointer text-left">
            <fa-icon [icon]="['fas','sign-out']" class="text-sm text-slate-400"></fa-icon>
            <span class="text-sm text-slate-200">Sign Out</span>
          </button>
        </div>
      }
    </header>

    @if(showExpense()){
        <app-add-expense (close)="showExpense.set(false)" (fetchExpData)="userContent.fetchAllExpenses()"></app-add-expense>
    }
    <app-user-content #userContent></app-user-content>

</div>
